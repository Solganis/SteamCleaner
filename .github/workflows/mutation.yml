name: Mutation

on:
  schedule:
    - cron: "0 4 * * 1" # weekly, Monday 04:00 UTC
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  mutation:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        # max = per-module survival ceiling (%), set from the baseline run plus headroom for
        # run-to-run noise. The gate fails the job if survival exceeds it. Tighten as tests improve.
        include:
          - { module: cleaner/engine.py, max: 24 }
          - { module: scanner/exclusions.py, max: 38 }
          - { module: scanner/engine.py, max: 18 }
          - { module: scanner/patterns.py, max: 78 } # pure data (pattern table), mutants mostly equivalent
          - { module: utils/fs.py, max: 48 }
          - { module: utils/vdf.py, max: 32 }
          - { module: utils/config.py, max: 20 }
          - { module: models/scan_result.py, max: 8 }
          - { module: clients/registry.py, max: 35 }
          - { module: clients/base.py, max: 28 }
          - { module: clients/shared.py, max: 25 }
          - { module: clients/steam.py, max: 8 }
          - { module: clients/epic.py, max: 8 }
          - { module: clients/ea_app.py, max: 5 }
          - { module: clients/gog.py, max: 5 }
          - { module: clients/ubisoft.py, max: 5 }
          - { module: platform/__init__.py, max: 5 } # no mutable statements after filtering
          - { module: platform/linux.py, max: 5 }
          - { module: platform/base.py, max: 48 }
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - run: uv sync

      - name: Run mutation testing
        env:
          MODULE: ${{ matrix.module }}
          MAX_SURVIVAL: ${{ matrix.max }}
        run: |
          # Reuse the committed config (test-command, timeout, operators-filter) and only swap the
          # target module, so CI and local runs stay in sync from a single source of truth.
          sed "s#^module-path = .*#module-path = \"src/steamcleaner/${MODULE}\"#" cosmic-ray.toml > run.toml

          uvx --from cosmic-ray==8.4.6 cosmic-ray baseline run.toml
          uvx --from cosmic-ray==8.4.6 cosmic-ray init run.toml session.sqlite
          uvx --from cosmic-ray==8.4.6 cr-filter-operators session.sqlite run.toml
          uvx --from cosmic-ray==8.4.6 cosmic-ray exec run.toml session.sqlite

          {
            echo "### Mutation: ${MODULE}"
            echo ""
            echo "Surviving mutants: $(uvx --from cosmic-ray==8.4.6 cr-rate session.sqlite)%"
          } >> "$GITHUB_STEP_SUMMARY"

          echo "::group::Surviving mutants (${MODULE})"
          uvx --from cosmic-ray==8.4.6 cr-report session.sqlite
          echo "::endgroup::"

          # Regression gate: exit non-zero if survival exceeds the per-module ceiling. Runs last so the
          # summary and full report are always emitted, even when the gate fails the job.
          uvx --from cosmic-ray==8.4.6 cr-rate --fail-over "${MAX_SURVIVAL}" session.sqlite
