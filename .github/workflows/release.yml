name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            artifact: SteamCleaner-windows
          - os: ubuntu-latest
            platform: linux
            artifact: SteamCleaner-linux
          - os: macos-latest
            platform: macos
            artifact: SteamCleaner-macos
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libglib2.0-dev ninja-build pkg-config cmake clang
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv sync
      - name: Cache Flutter SDK and Flet template
        uses: actions/cache@v4
        with:
          path: |
            ~/flutter
            ~/.flet
            ~/.pub-cache
            ~/AppData/Local/Pub/Cache
          key: flet-build-${{ matrix.os }}-flet0.85
          restore-keys: flet-build-${{ matrix.os }}-
      - name: Build
        if: matrix.os != 'windows-latest'
        run: uv run flet build ${{ matrix.platform }} --yes --no-rich-output -o dist
        env:
          PYTHONIOENCODING: utf-8
      - name: Build (Windows, patched)
        if: matrix.os == 'windows-latest'
        run: |
          uv run flet build windows --yes --no-rich-output
          uv run python scripts/build_windows.py --skip-flet-build
        env:
          PYTHONIOENCODING: utf-8
      - name: Strip debug symbols (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: find dist -type f -executable -exec strip --strip-unneeded {} + 2>/dev/null || true
      - name: Archive (Windows)
        if: matrix.os == 'windows-latest'
        run: 7z a -mx=5 ${{ matrix.artifact }}.zip ./build/windows/*
      - name: Archive (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: tar -cf - -C dist . | xz -3 > ${{ matrix.artifact }}.tar.xz
      - name: Archive (macOS)
        if: matrix.os == 'macos-latest'
        run: tar -cf - -C dist . | xz -3 > ${{ matrix.artifact }}.tar.xz
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.*

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
