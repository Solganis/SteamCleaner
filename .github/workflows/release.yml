name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      platforms:
        description: "Platforms to build"
        type: choice
        default: windows
        options:
          - windows
          - all

permissions:
  contents: write

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - id: set
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.platforms }}" != "all" ]]; then
            echo 'matrix={"include":[{"os":"windows-latest","platform":"windows","artifact":"SteamCleaner-windows"}]}' >> "$GITHUB_OUTPUT"
          else
            echo 'matrix={"include":[{"os":"windows-latest","platform":"windows","artifact":"SteamCleaner-windows"},{"os":"ubuntu-latest","platform":"linux","artifact":"SteamCleaner-linux"},{"os":"macos-latest","platform":"macos","artifact":"SteamCleaner-macos"}]}' >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: setup
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libglib2.0-dev ninja-build pkg-config cmake clang
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
        with:
          enable-cache: true
      - run: uv sync
      - name: Cache Flutter SDK and Flet template
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/flutter
            ~/.flet
            ~/.pub-cache
            ~/AppData/Local/Pub/Cache
          key: flet-build-${{ matrix.os }}-flet0.85
          restore-keys: flet-build-${{ matrix.os }}-
      - name: Build
        if: matrix.os != 'windows-latest'
        run: uv run flet build ${{ matrix.platform }} --yes --no-rich-output -o dist
        env:
          PYTHONIOENCODING: utf-8
      - name: Build (Windows, patched)
        if: matrix.os == 'windows-latest'
        run: |
          uv run flet build windows --yes --no-rich-output
          uv run python scripts/build_windows.py --skip-flet-build
        env:
          PYTHONIOENCODING: utf-8
      - name: Strip debug symbols (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: find dist -type f -executable -exec strip --strip-unneeded {} + 2>/dev/null || true
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: matrix.os == 'windows-latest'
        with:
          name: ${{ matrix.artifact }}
          path: build/windows
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: matrix.os != 'windows-latest'
        with:
          name: ${{ matrix.artifact }}
          path: dist

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts
      - name: Create archives
        run: |
          cd artifacts/SteamCleaner-windows && zip -r ../SteamCleaner-windows.zip . && cd ../..
          tar -cf - -C artifacts/SteamCleaner-linux . | xz -3 > artifacts/SteamCleaner-linux.tar.xz
          tar -cf - -C artifacts/SteamCleaner-macos . | xz -3 > artifacts/SteamCleaner-macos.tar.xz
      - uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: |
            artifacts/SteamCleaner-windows.zip
            artifacts/SteamCleaner-linux.tar.xz
            artifacts/SteamCleaner-macos.tar.xz
          generate_release_notes: true
