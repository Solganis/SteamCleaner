name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      platforms:
        description: "Platforms to build"
        type: choice
        default: windows
        options:
          - windows
          - all

permissions:
  contents: read

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - id: set
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.platforms }}" != "all" ]]; then
            echo 'matrix={"include":[{"os":"windows-latest","platform":"windows","artifact":"SteamCleaner-windows"}]}' >> "$GITHUB_OUTPUT"
          else
            echo 'matrix={"include":[{"os":"windows-latest","platform":"windows","artifact":"SteamCleaner-windows"},{"os":"ubuntu-latest","platform":"linux","artifact":"SteamCleaner-linux"},{"os":"macos-latest","platform":"macos","artifact":"SteamCleaner-macos"}]}' >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: setup
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libglib2.0-dev ninja-build pkg-config cmake clang
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
      - run: uv sync
      - name: Cache Flutter SDK and Flet template
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/flutter
            ~/.flet
            ~/.pub-cache
            ~/AppData/Local/Pub/Cache
          key: flet-build-${{ matrix.os }}-flet0.85
          restore-keys: flet-build-${{ matrix.os }}-
      - name: Build
        if: matrix.os != 'windows-latest'
        run: uv run flet build "$BUILD_PLATFORM" --yes --no-rich-output -o dist
        env:
          BUILD_PLATFORM: ${{ matrix.platform }}
          PYTHONIOENCODING: utf-8
      - name: Build (Windows, patched)
        if: matrix.os == 'windows-latest'
        run: |
          uv run flet build windows --yes --no-rich-output
          uv run python scripts/build_windows.py --skip-flet-build
        env:
          PYTHONIOENCODING: utf-8
      - name: Strip debug symbols (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: find dist -type f -executable -exec strip --strip-unneeded {} + 2>/dev/null || true
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: matrix.os == 'windows-latest'
        with:
          name: ${{ matrix.artifact }}
          path: build/windows
          retention-days: 3
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: matrix.os != 'windows-latest'
        with:
          name: ${{ matrix.artifact }}
          path: dist
          retention-days: 3

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
      - name: Create archives
        run: |
          cd artifacts/SteamCleaner-windows && zip -r ../SteamCleaner-windows.zip . && cd ../..
          tar -cf - -C artifacts/SteamCleaner-linux . | xz -3 > artifacts/SteamCleaner-linux.tar.xz
          tar -cf - -C artifacts/SteamCleaner-macos . | xz -3 > artifacts/SteamCleaner-macos.tar.xz
      - uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: |
            artifacts/SteamCleaner-windows.zip
            artifacts/SteamCleaner-linux.tar.xz
            artifacts/SteamCleaner-macos.tar.xz
          generate_release_notes: true
