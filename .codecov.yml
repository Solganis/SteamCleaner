coverage:
  status:
    project:
      default:
        target: 100%
        threshold: 0%
    patch:
      default:
        target: 100%
        threshold: 0%

ignore:
  - "src/main.py"
  - "src/steamcleaner/ui/**"
  - "src/steamcleaner/platform/windows.py"
  - "src/steamcleaner/platform/macos.py"
  - "src/steamcleaner/__main__.py"
  - "src/steamcleaner/app.py"
  - "scripts/**"
